<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchMySkin | Team Builder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" id="main-nav" style="display: none;">
        <div class="nav-logo" onclick="showView('view-home')">MATCH<span>MYSKIN</span></div>
        <ul class="nav-links">
            <li><a href="#" onclick="showView('view-home')">Inicio</a></li>
            <li><a href="#" onclick="showView('view-inventory')">Mis Skins</a></li>
            <li><a href="#" onclick="logout()" class="logout-link">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <section id="view-auth" class="view container active">
        <div class="auth-card">
            <h2 id="auth-title">Bienvenido</h2>
            <div class="auth-inputs">
                <input type="text" id="auth-user" placeholder="Usuario">
                <input type="password" id="auth-pass" placeholder="Contraseña">
                <button class="btn-main" onclick="handleAuth()">Ingresar</button>
            </div>
            <button onclick="toggleAuthMode()" id="auth-switch" class="btn-switch">¿No tienes cuenta? Regístrate</button>
        </div>
    </section>

    <section id="view-home" class="view container">
        <div class="home-card">
            <h1>Descubre tu Sinergia</h1>
            <p>Crea una sala e invita a tus amigos o únete con un código.</p>
            
            <div class="lobby-actions-container" style="display: flex; gap: 15px; margin-top: 20px; justify-content: center; flex-wrap: wrap;">
                <button class="btn-main large" onclick="createNewLobby()">CREAR NUEVA SALA</button>
                
                <div class="join-lobby-box" style="display: flex; gap: 10px;">
                    <input type="text" id="lobby-code-input" placeholder="Código (Ej: A4X9P2)" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc; text-transform: uppercase; font-weight: bold; width: 150px;">
                    <button class="btn-secondary" style="padding: 10px 20px;" onclick="joinLobbyFromInput()">Unirse</button>
                </div>
            </div>
        </div>
    </section>

    <section id="view-inventory" class="view container">
        <div class="inventory-header">
            <h2>Mi Colección</h2>
            <input type="text" id="skin-search" placeholder="Buscar campeón o skin..." onkeyup="filterSkins()">
        </div>
        <div id="themes-container" class="themes-grid"></div>
    </section>

    <section id="view-lobby" class="view container">
        <div class="lobby-card">
            <div class="header-row" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>SALA: <span id="display-code" class="accent">#-----</span></h2>
                <button class="btn-secondary" onclick="copyInviteLink()">Copiar Invitación</button>
            </div>
            <div id="team-results" class="team-results-container"></div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
