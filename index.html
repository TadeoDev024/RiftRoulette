<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiftRoulette | Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="notification" class="notification">¡Copiado al portapapeles!</div>

    <section id="view-lobby" class="view container">
        <div class="lobby-card">
            <div class="header-row">
                <h2>SALA: <span id="display-code" class="accent">#-----</span></h2>
                <button class="btn-secondary" onclick="copyInviteLink()">Invitar Amigos</button>
            </div>

            <div id="player-grid" class="player-grid">
                </div>

            <div class="roulette-wrapper">
                <div id="wheel" class="wheel">?</div>
                <button id="spin-btn" class="btn-main" onclick="triggerRoulette()">GIRAR RULETA</button>
            </div>
            
            <div id="result-display" class="result-display"></div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
